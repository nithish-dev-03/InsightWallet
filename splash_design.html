<style>
        body {
            background-color: #15121b;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .splash-gradient {
            background: radial-gradient(circle at 50% 50%, #2e1065 0%, #1e1b4b 40%, #15121b 100%);
        }

        .mesh-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10vw, -10vh) scale(1.1); }
            66% { transform: translate(-5vw, 15vh) scale(0.9); }
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.7s; }
        .delay-3 { animation-delay: 1s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-glow {
            position: relative;
        }

        .logo-glow::after {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .loading-bar-container {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            overflow: hidden;
            margin-top: 48px;
        }

        .loading-bar-progress {
            width: 100%;
            height: 100%;
            background: #7c3aed;
            transform: translateX(-100%);
            animation: loading 3s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            animation-delay: 1.5s;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0%); }
        }
    </style>

<!-- Interactive Canvas Layer for Cursor Interaction -->
<canvas class="absolute inset-0 pointer-events-none z-[1]" id="particleCanvas"></canvas>
<script>
        // Micro-interaction: Subtle Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(210, 187, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();

        // Simulate Page Transition after loading
        setTimeout(() => {
            // This is where you would normally navigate to the main dashboard
            console.log("Loading sequence complete. Ready for main navigation.");
        }, 5000);
    </script>
